{% extends "base.html" %}
{% block title %}Cancelar NFe{% endblock %}

{% block content %}
<h3 class="mb-4"><i class="bi bi-x-circle"></i> Cancelar NFe</h3>

<div class="alert alert-warning">
    <i class="bi bi-exclamation-triangle"></i>
    <strong>Atencao:</strong> O cancelamento de NFe so e permitido em ate 24 horas apos a autorizacao.
    A justificativa deve ter no minimo 15 caracteres.
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Chave de Acesso (44 digitos)</label>
                    <input type="text" class="form-control font-monospace" name="chave_acesso"
                           maxlength="44" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Protocolo de Autorizacao</label>
                    <input type="text" class="form-control" name="protocolo" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Justificativa (minimo 15 caracteres)</label>
                <textarea class="form-control" name="justificativa" rows="3" minlength="15" required></textarea>
            </div>
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-x-circle"></i> Cancelar NFe
            </button>
        </form>
    </div>
</div>

<div class="mt-3">
    <a href="{{ url_for('index') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>
{% endblock %}
