{% extends "base.html" %}
{% block title %}Consultar NFe{% endblock %}

{% block content %}
<h3 class="mb-4"><i class="bi bi-search"></i> Consultar NFe</h3>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-8">
                    <label class="form-label">Chave de Acesso (44 digitos)</label>
                    <input type="text" class="form-control font-monospace" name="chave_acesso"
                           maxlength="44" required placeholder="Informe os 44 digitos da chave de acesso">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Consultar
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="mt-3">
    <a href="{{ url_for('index') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>
{% endblock %}
